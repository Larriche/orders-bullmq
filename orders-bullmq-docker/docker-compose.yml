services:
  redis:
    image: redis:latest
    container_name: dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped


  mongodb1:
    image: mongo:latest
    container_name: dev-mongodb1
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_REPLICA_SET_NAME=rs0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    volumes:
      - mongo1-data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    restart: unless-stopped

  mongodb2:
    image: mongo:latest
    container_name: dev-mongodb2
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_REPLICA_SET_NAME=rs0
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile"]
    volumes:
      - mongo2-data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    restart: unless-stopped

  mongo-init-replica:
    image: mongo:latest
    container_name: mongo-init-replica
    depends_on:
      - mongodb1
      - mongodb2
    entrypoint: ["bash", "/init-replica.sh"]
    volumes:
      - ./init-replica.sh:/init-replica.sh:ro
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: orders-bullmq-docker/Dockerfile.app
    image: orders-bullmq-app

  default-worker:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/default-worker.js"]
    restart: unless-stopped

  orders-worker:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/orders-worker.js"]
    deploy:
      replicas: 2
    restart: unless-stopped

  notifications-worker:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/notifications-worker.js"]
    deploy:
      replicas: 3
    restart: unless-stopped

  payments-worker:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/payments-worker.js"]
    restart: unless-stopped

  scheduled-worker:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/scheduled-worker.js"]
    restart: unless-stopped

  events-poller:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
      event-service:
        condition: service_started
    env_file:
      - ../.env
    environment:
      - EVENT_SERVICE_URL=http://event-service:4040
    command: ["node", "dist/src/run/events-poller.js"]
    restart: unless-stopped

  outbox-poller:
    image: orders-bullmq-app
    depends_on:
      app:
        condition: service_started
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      redis:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    command: ["node", "dist/src/run/outbox-poller.js"]
    restart: unless-stopped

  board:
    image: orders-bullmq-app
    depends_on:
      - app
      - redis
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    command: ["node", "dist/src/run/board.js"]
    restart: unless-stopped

  payment-service:
    build:
      context: ..
      dockerfile: orders-bullmq-docker/Dockerfile.payment
    container_name: dev-payment-service
    ports:
      - "4000:4000"
    restart: unless-stopped

  event-service:
    build:
      context: ..
      dockerfile: orders-bullmq-docker/Dockerfile.events
    container_name: dev-event-service
    ports:
      - "4040:4040"
    depends_on:
      mongodb1:
        condition: service_started
      mongodb2:
        condition: service_started
      mongo-init-replica:
        condition: service_completed_successfully
    env_file:
      - ../.env
    volumes:
      - events-data:/app/data
    restart: unless-stopped

volumes:
  redis-data:
  mongo1-data:
  mongo2-data:
  events-data:
